name: Deploy

on:
  push:
    branches: [main, dev]
    # Docs-only pushes don't change the shipped worker (docs/, *.md, and these
    # root files aren't bundled into the build), so skip the no-op deploy. CI
    # still runs on these via ci.yml. Note: a push touching ONLY these paths is
    # skipped entirely — fine because deploy isn't a required status check.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"

concurrency:
  group: deploy-${{ github.ref }}
  # Cancel an in-progress deploy when a newer commit is pushed to the same
  # branch. Both steps are safe to interrupt: `wrangler deploy` is atomic, and
  # `convex deploy` pushes the full desired schema+functions state — a canceled
  # push is superseded by the newer commit redeploying that complete state. Data
  # migrations (backfills) are run manually out-of-band, not in this workflow, so
  # cancellation never interrupts one mid-flight.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
    env:
      # Wrangler honors CLOUDFLARE_ENV as the default `--env` for every
      # subcommand (deploy, secret bulk, …). With `legacy_env: true` (set in
      # our build output) the worker name becomes `<top-level-name>-<env>`,
      # i.e. `stack-dev` / `stack-prod` — so deploy and secret bulk both
      # target the same worker without needing `--name` overrides.
      CLOUDFLARE_ENV: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - run: bun install --frozen-lockfile

      # Push backend (schema + functions) before building the worker: the build
      # embeds VITE_CONVEX_URL, and the running worker expects the deployment it
      # points at to already serve the current functions. The deploy key encodes
      # which deployment to target (dev vs prod), supplied per GitHub environment.
      - name: Deploy Convex
        working-directory: packages/api
        run: bun run deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Build apps/web
        working-directory: apps/web
        run: bun run build
        env:
          VITE_CONVEX_URL: ${{ vars.CONVEX_URL }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: "4"
          command: deploy
          secrets: |
            WORKOS_API_KEY
            WORKOS_CLIENT_ID
            WORKOS_COOKIE_PASSWORD
            WORKOS_REDIRECT_URI
            CONVEX_URL
        env:
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
          WORKOS_REDIRECT_URI: ${{ vars.WORKOS_REDIRECT_URI }}
          CONVEX_URL: ${{ vars.CONVEX_URL }}
